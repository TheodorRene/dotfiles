# Compressed RAM-backed swap via systemd-zram-generator.
#
# Why: a heavy dev load (.NET + webpack + cargo/rustc + docker + browser) on
# 30 GB RAM was overshooting by a few GB and oomd killed the whole session.
# zram gives effective headroom by compressing swapped pages in RAM (~3:1 on
# dev heaps), which is far faster than the 8 GB disk swapfile and absorbs the
# spikes so oomd rarely needs to fire at all.
#
# 16 GB uncompressed cap; at ~3:1 that costs ~5 GB real RAM under load. zstd is
# the best speed/ratio tradeoff. swap-priority 100 puts zram ahead of the disk
# swapfile (priority -1), which stays as a low-priority overflow backstop.
[zram0]
zram-size = 16384
compression-algorithm = zstd
swap-priority = 100
