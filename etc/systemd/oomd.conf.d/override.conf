# systemd-oomd global tuning. Paired with zram (see ../zram-generator.conf).
#
# We deliberately do NOT set SwapUsedLimit: swap killing is disabled for
# user.slice (ManagedOOMSwap=auto) because zram makes swap usage a bad signal.
# The only kill trigger that remains is sustained memory pressure, kept at the
# upstream-sane 60% for 20s so oomd fires only in a genuine, lasting crunch
# (the old 40%/10s was hair-trigger and killed the whole session prematurely).
[OOM]
DefaultMemoryPressureLimit=60%
DefaultMemoryPressureDurationSec=20s
