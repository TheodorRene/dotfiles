# systemd-oomd policy for the user session.
# Kill on sustained *memory pressure* (PSI), not on swap fullness: with zram
# (see ../../zram-generator.conf) swap fills cheaply by design, so swap% is a
# meaningless distress signal and ManagedOOMSwap=kill would nuke the session
# the moment zram warms up. Pressure is the real "we're actually in trouble".
[Slice]
ManagedOOMMemoryPressure=kill
ManagedOOMSwap=auto
