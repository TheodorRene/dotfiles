# VM tuning for a zram-primary, memory-overcommitted dev laptop (30 GB RAM,
# 16 GB zram zstd + 8 GB disk swap overflow). Complements the oomd/zram setup in
# etc/systemd/ (see scripts/install-oomd-tuning.sh).
#
# Applied by scripts/install-perf-tuning.sh (symlinked into /etc/sysctl.d/).
# Reload without reboot: sudo sysctl --system

# No swap read-ahead. zram is RAM-speed random access; the default read-ahead of
# 2^3 = 8 pages per fault just wastes CPU decompressing pages we won't use.
vm.page-cluster = 0

# Prefer compressing cold anon pages into fast zram over evicting file cache
# (source trees, node_modules, parser/LSP caches). Range 100-180 is sane for
# zram; 150 keeps the working set hot without excessive compression churn.
vm.swappiness = 150

# Retain dentry/inode cache harder — huge dir trees (pnpm/node_modules, cargo)
# make directory metadata expensive to re-fetch. Lower = keep caches longer.
vm.vfs_cache_pressure = 50

# Wake kswapd earlier so reclaim happens in the background instead of as
# latency-spiking direct reclaim (and fewer oomd session-kills under pressure).
vm.watermark_scale_factor = 100
