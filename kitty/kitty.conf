# kitty config — ported from alacritty as the baseline.
# Theme/font/padding/selection mirror alacritty/alacritty.toml exactly; the
# extras at the bottom are kitty-native niceties.

# ── Font ────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0

# ── Window ──────────────────────────────────────────────────────
window_padding_width 4

# ── Selection (alacritty: save_to_clipboard = true) ─────────────
copy_on_select clipboard

# ── Coral theme (matches waybar / wofi / swaylock / alacritty) ──
background            #0d0d0d
foreground            #d6d6d6
cursor                #ffffff
cursor_text_color     #0d0d0d
selection_foreground  #ffffff
selection_background  #3a3a3a

# normal
color0  #1a1a1a
color1  #e0645a
color2  #8faf7a
color3  #d9b08c
color4  #7fa2c0
color5  #c98fb0
color6  #8ec0bf
color7  #c0c0c0
# bright
color8  #4a4a4a
color9  #ff5a4d
color10 #a6c293
color11 #e6c08a
color12 #9cb8d6
color13 #d6a8c4
color14 #a8d4d2
color15 #f0f0f0

# ── Keybindings ─────────────────────────────────────────────────
# alacritty sent Shift+Return -> ESC CR; reproduce it here.
map shift+enter send_text all \x1b\r

# ── kitty-native niceties (no alacritty equivalent) ─────────────
scrollback_lines        10000
enable_audio_bell       no
confirm_os_window_close 0
cursor_shape            beam
cursor_blink_interval   0
mouse_hide_wait         3.0
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
url_style               curly
detect_urls             yes
